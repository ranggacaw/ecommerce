services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colorbox-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Colorbox
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: colorbox
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SHIPMENT_WEBHOOK_TOKEN: sandbox-webhook-token
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: colorbox-postgres
    environment:
      POSTGRES_DB: colorbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d colorbox"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
